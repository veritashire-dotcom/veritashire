<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeritasHire — Hire-to-Own Offshore VA System</title>
<meta name="description" content="We place a vetted Indian VA with your business, run the first 90 days, then hand you a proven hire you own completely. No agency markup. Ever.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

<style>
/* ── Reset & Variables ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0D0F14;
  --ink-2:     #151820;
  --ink-3:     #1E222E;
  --gold:      #C9A96E;
  --gold-pale: #E8D5B0;
  --gold-dim:  #7A5F36;
  --fog:       #8A8FA0;
  --mist:      #B8BECA;
  --white:     #F4F1EC;
  --line:      rgba(201,169,110,0.15);
  --line-dim:  rgba(201,169,110,0.07);

  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'DM Sans', system-ui, sans-serif;

  --max: 1160px;
  --pad: clamp(1.5rem, 5vw, 4rem);
}

html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--white);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  cursor: default;
}

/* ── Grain overlay ───────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* ── Typography ─────────────────────────────────────────────── */
h1, h2, h3, h4 { font-family: var(--serif); font-weight: 400; line-height: 1.1; letter-spacing: -0.01em; }

.label {
  font-family: var(--sans);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ── Layout ─────────────────────────────────────────────────── */
.container { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }
section { position: relative; }

/* ── Nav ─────────────────────────────────────────────────────── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.4rem var(--pad);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(13,15,20,0.95) 0%, transparent 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.nav-logo {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--white);
  letter-spacing: 0.02em;
  text-decoration: none;
}
.nav-logo span { color: var(--gold); }

.nav-cta {
  font-family: var(--sans);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--ink);
  background: var(--gold);
  padding: 0.6rem 1.4rem;
  text-decoration: none;
  transition: background 0.2s, transform 0.2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.nav-cta:hover { background: var(--gold-pale); transform: translateY(-1px); }

/* ── Hero ────────────────────────────────────────────────────── */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 120px var(--pad) 80px;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 50%, rgba(201,169,110,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(201,169,110,0.04) 0%, transparent 60%);
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,169,110,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,169,110,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}

.hero-inner {
  position: relative;
  max-width: var(--max);
  margin: 0 auto;
  width: 100%;
}

.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.1s forwards;
}
.hero-eyebrow::before {
  content: '';
  width: 40px;
  height: 1px;
  background: var(--gold);
}

.hero-headline {
  font-size: clamp(3.2rem, 7vw, 6.5rem);
  font-weight: 300;
  line-height: 1.0;
  letter-spacing: -0.03em;
  max-width: 820px;
  margin-bottom: 1.8rem;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.2s forwards;
}
.hero-headline em {
  font-style: italic;
  color: var(--gold);
  font-weight: 300;
}

.hero-sub {
  font-size: clamp(1rem, 1.6vw, 1.15rem);
  color: var(--mist);
  max-width: 560px;
  line-height: 1.7;
  margin-bottom: 3rem;
  font-weight: 300;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.35s forwards;
}

.hero-actions {
  display: flex;
  align-items: center;
  gap: 2rem;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.5s forwards;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--ink);
  background: var(--gold);
  padding: 0.9rem 2rem;
  text-decoration: none;
  position: relative;
  transition: all 0.25s ease;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
}
.btn-primary::after {
  content: '→';
  transition: transform 0.2s;
}
.btn-primary:hover { background: var(--gold-pale); transform: translateY(-2px); }
.btn-primary:hover::after { transform: translateX(4px); }

.hero-trust {
  font-size: 0.8rem;
  color: var(--fog);
  font-weight: 300;
  letter-spacing: 0.02em;
}
.hero-trust strong { color: var(--mist); font-weight: 400; }

.hero-stat-strip {
  display: flex;
  gap: 3rem;
  flex-wrap: wrap;
  margin-top: 5rem;
  padding-top: 2.5rem;
  border-top: 1px solid var(--line);
  opacity: 0;
  animation: fadeUp 0.9s ease 0.65s forwards;
}

.hero-stat { display: flex; flex-direction: column; gap: 0.3rem; }
.hero-stat-num {
  font-family: var(--serif);
  font-size: 2.4rem;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
}
.hero-stat-label { font-size: 0.75rem; color: var(--fog); letter-spacing: 0.08em; text-transform: uppercase; }

/* ── Problem ─────────────────────────────────────────────────── */
#problem {
  padding: 8rem var(--pad);
  background: var(--ink-2);
  border-top: 1px solid var(--line-dim);
}

.problem-layout {
  max-width: var(--max);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: start;
}

.problem-left {}
.problem-left .label { margin-bottom: 1.5rem; display: block; }
.problem-title {
  font-size: clamp(2.4rem, 4vw, 3.4rem);
  font-weight: 300;
  line-height: 1.1;
  margin-bottom: 1.5rem;
  color: var(--white);
}
.problem-title em { color: var(--gold); font-style: italic; }
.problem-body {
  color: var(--mist);
  font-size: 1rem;
  line-height: 1.75;
  font-weight: 300;
}

.problem-right { display: flex; flex-direction: column; gap: 0; }

.problem-item {
  padding: 1.6rem 0;
  border-bottom: 1px solid var(--line-dim);
  display: flex;
  gap: 1.2rem;
  align-items: flex-start;
}
.problem-item:first-child { border-top: 1px solid var(--line-dim); }

.problem-num {
  font-family: var(--serif);
  font-size: 1.8rem;
  color: var(--gold-dim);
  line-height: 1;
  flex-shrink: 0;
  width: 2.5rem;
  font-weight: 300;
}
.problem-text h4 {
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--white);
  margin-bottom: 0.3rem;
  letter-spacing: 0.02em;
}
.problem-text p { font-size: 0.88rem; color: var(--fog); line-height: 1.6; font-weight: 300; }

/* ── Model ───────────────────────────────────────────────────── */
#model {
  padding: 8rem var(--pad);
  background: var(--ink);
  overflow: hidden;
}

.model-inner { max-width: var(--max); margin: 0 auto; }
.model-header { text-align: center; margin-bottom: 5rem; }
.model-header .label { margin-bottom: 1.2rem; display: block; }
.model-title {
  font-size: clamp(2.4rem, 4vw, 3.6rem);
  font-weight: 300;
  line-height: 1.1;
}
.model-title em { color: var(--gold); font-style: italic; }
.model-subtitle { color: var(--mist); font-weight: 300; margin-top: 1rem; font-size: 1rem; }

.model-steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  position: relative;
}

.model-steps::before {
  content: '';
  position: absolute;
  top: 3.5rem;
  left: 16%;
  right: 16%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
  z-index: 0;
}

.model-step {
  padding: 0 2rem;
  position: relative;
  z-index: 1;
  text-align: center;
}
.model-step:not(:last-child)::after {
  content: '→';
  position: absolute;
  right: -0.5rem;
  top: 3rem;
  font-size: 1rem;
  color: var(--gold-dim);
  transform: translateY(-50%);
}

.step-icon {
  width: 7rem;
  height: 7rem;
  border: 1px solid var(--gold-dim);
  background: var(--ink-2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.8rem;
  position: relative;
  clip-path: polygon(15px 0%, 100% 0%, calc(100% - 15px) 100%, 0% 100%);
}

.step-icon svg { width: 28px; height: 28px; stroke: var(--gold); fill: none; stroke-width: 1.5; }

.step-num {
  font-family: var(--serif);
  font-size: 0.75rem;
  color: var(--gold-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.5rem;
}
.step-title {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--white);
  margin-bottom: 0.8rem;
}
.step-body { font-size: 0.875rem; color: var(--fog); line-height: 1.65; font-weight: 300; }

/* ── Process ─────────────────────────────────────────────────── */
#process {
  padding: 8rem var(--pad);
  background: var(--ink-2);
  border-top: 1px solid var(--line-dim);
}

.process-inner { max-width: var(--max); margin: 0 auto; }
.process-header { margin-bottom: 4rem; }
.process-header .label { display: block; margin-bottom: 1.2rem; }
.process-header h2 {
  font-size: clamp(2.2rem, 4vw, 3.2rem);
  font-weight: 300;
  max-width: 600px;
}
.process-header h2 em { color: var(--gold); font-style: italic; }

.process-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line-dim);
  border: 1px solid var(--line-dim);
}

.process-card {
  background: var(--ink);
  padding: 2.4rem 1.8rem;
  position: relative;
  overflow: hidden;
  transition: background 0.3s;
}
.process-card:hover { background: var(--ink-3); }

.process-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
  transform: scaleX(0);
  transition: transform 0.3s ease;
  transform-origin: left;
}
.process-card:hover::before { transform: scaleX(1); }

.process-week {
  font-family: var(--serif);
  font-size: 2.5rem;
  color: rgba(201,169,110,0.18);
  font-weight: 300;
  line-height: 1;
  margin-bottom: 1rem;
}
.process-phase { font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.8rem; font-weight: 500; }
.process-title { font-family: var(--serif); font-size: 1.3rem; color: var(--white); margin-bottom: 0.8rem; font-weight: 400; }
.process-body { font-size: 0.82rem; color: var(--fog); line-height: 1.65; font-weight: 300; }

/* ── Pricing ─────────────────────────────────────────────────── */
#pricing {
  padding: 8rem var(--pad);
  background: var(--ink);
}

.pricing-inner { max-width: var(--max); margin: 0 auto; }
.pricing-header { text-align: center; margin-bottom: 4rem; }
.pricing-header .label { display: block; margin-bottom: 1.2rem; }
.pricing-header h2 { font-size: clamp(2.2rem, 4vw, 3.2rem); font-weight: 300; }
.pricing-header h2 em { color: var(--gold); font-style: italic; }
.pricing-header p { color: var(--mist); font-weight: 300; margin-top: 0.8rem; font-size: 0.95rem; }

.pricing-grid {
  display: grid;
  grid-template-columns: 1fr 1.1fr 1fr;
  gap: 1px;
  background: var(--line-dim);
  border: 1px solid var(--line-dim);
  margin-bottom: 3rem;
}

.price-card {
  background: var(--ink-2);
  padding: 2.8rem 2rem;
  position: relative;
  text-align: center;
  transition: background 0.3s;
}
.price-card.featured {
  background: var(--ink-3);
  border-top: 2px solid var(--gold);
}
.price-card.featured::before {
  content: 'YOUR INVESTMENT';
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%) translateY(-100%);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  background: var(--gold);
  color: var(--ink);
  padding: 0.3rem 0.8rem;
  font-weight: 600;
}

.price-phase { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fog); margin-bottom: 1.2rem; font-weight: 500; }

.price-amount {
  font-family: var(--serif);
  font-size: 3.5rem;
  font-weight: 300;
  color: var(--white);
  line-height: 1;
  margin-bottom: 0.2rem;
}
.price-amount sup { font-size: 1.5rem; vertical-align: super; color: var(--gold); }
.price-amount span { font-size: 1rem; color: var(--fog); font-family: var(--sans); }

.price-sub { font-size: 0.8rem; color: var(--fog); margin-bottom: 1.8rem; font-weight: 300; }

.price-features { list-style: none; text-align: left; display: flex; flex-direction: column; gap: 0.7rem; }
.price-features li {
  font-size: 0.83rem;
  color: var(--mist);
  padding-left: 1.2rem;
  position: relative;
  font-weight: 300;
  line-height: 1.5;
}
.price-features li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--gold-dim);
}

.pricing-note {
  text-align: center;
  padding: 2rem;
  border: 1px solid var(--line);
  background: rgba(201,169,110,0.03);
}
.pricing-note p { font-size: 0.88rem; color: var(--mist); font-weight: 300; line-height: 1.7; }
.pricing-note strong { color: var(--gold); font-weight: 500; }

/* ── Comparison ──────────────────────────────────────────────── */
#comparison {
  padding: 8rem var(--pad);
  background: var(--ink-2);
  border-top: 1px solid var(--line-dim);
}

.comparison-inner { max-width: var(--max); margin: 0 auto; }
.comparison-header { text-align: center; margin-bottom: 4rem; }
.comparison-header .label { display: block; margin-bottom: 1.2rem; }
.comparison-header h2 { font-size: clamp(2.2rem, 4vw, 3.2rem); font-weight: 300; }
.comparison-header h2 em { color: var(--gold); font-style: italic; }

.comparison-table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid var(--line-dim);
}
.comparison-table th, .comparison-table td {
  padding: 1.1rem 1.4rem;
  text-align: left;
  border-bottom: 1px solid var(--line-dim);
  font-size: 0.875rem;
}
.comparison-table thead tr { background: var(--ink-3); }
.comparison-table th {
  font-family: var(--sans);
  font-weight: 500;
  letter-spacing: 0.05em;
  font-size: 0.78rem;
  text-transform: uppercase;
  color: var(--mist);
}
.comparison-table th.ours { color: var(--gold); }

.comparison-table td { color: var(--mist); font-weight: 300; }
.comparison-table td.factor { color: var(--white); font-weight: 400; }
.comparison-table td.ours { color: var(--gold-pale); font-weight: 400; background: rgba(201,169,110,0.04); }
.comparison-table td.them { color: var(--fog); }
.comparison-table tr:hover td { background: rgba(201,169,110,0.02); }
.comparison-table tr:hover td.ours { background: rgba(201,169,110,0.06); }

/* ── FAQ ─────────────────────────────────────────────────────── */
#faq {
  padding: 8rem var(--pad);
  background: var(--ink);
}

.faq-inner { max-width: var(--max); margin: 0 auto; }
.faq-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 6rem; align-items: start; }

.faq-left .label { display: block; margin-bottom: 1.2rem; }
.faq-left h2 { font-size: clamp(2.2rem, 3.5vw, 3rem); font-weight: 300; line-height: 1.1; }
.faq-left h2 em { color: var(--gold); font-style: italic; }
.faq-left p { color: var(--mist); font-weight: 300; font-size: 0.9rem; margin-top: 1rem; line-height: 1.7; }

.faq-list { display: flex; flex-direction: column; }

.faq-item {
  border-bottom: 1px solid var(--line-dim);
  cursor: pointer;
}
.faq-item:first-child { border-top: 1px solid var(--line-dim); }

.faq-q {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.4rem 0;
  gap: 1rem;
}
.faq-q span {
  font-family: var(--sans);
  font-size: 0.92rem;
  font-weight: 400;
  color: var(--white);
  line-height: 1.4;
}
.faq-icon {
  width: 20px; height: 20px;
  flex-shrink: 0;
  position: relative;
  color: var(--gold);
}
.faq-icon::before, .faq-icon::after {
  content: '';
  position: absolute;
  background: currentColor;
  transition: transform 0.3s ease, opacity 0.3s;
}
.faq-icon::before { width: 12px; height: 1px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
.faq-icon::after { width: 1px; height: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
.faq-item.open .faq-icon::after { transform: translate(-50%, -50%) rotate(90deg); opacity: 0; }

.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.faq-a p {
  padding-bottom: 1.4rem;
  font-size: 0.875rem;
  color: var(--fog);
  line-height: 1.75;
  font-weight: 300;
}
.faq-item.open .faq-a { max-height: 300px; }

/* ── CTA ─────────────────────────────────────────────────────── */
#cta {
  padding: 8rem var(--pad);
  background: var(--ink-2);
  border-top: 1px solid var(--line-dim);
  overflow: hidden;
  position: relative;
}

#cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 80% at 50% 50%, rgba(201,169,110,0.05) 0%, transparent 70%);
}

.cta-inner {
  max-width: 760px;
  margin: 0 auto;
  text-align: center;
  position: relative;
}

.cta-label { display: block; margin-bottom: 1.5rem; }
.cta-title {
  font-size: clamp(2.8rem, 5vw, 4.5rem);
  font-weight: 300;
  line-height: 1.05;
  margin-bottom: 1.5rem;
}
.cta-title em { color: var(--gold); font-style: italic; }

.cta-sub {
  font-size: 1rem;
  color: var(--mist);
  font-weight: 300;
  line-height: 1.7;
  max-width: 560px;
  margin: 0 auto 3rem;
}

.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.8rem;
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--ink);
  background: var(--gold);
  padding: 1.1rem 2.6rem;
  text-decoration: none;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  transition: all 0.25s ease;
  margin-bottom: 1.5rem;
  display: inline-flex;
}
.cta-btn::after { content: '→'; transition: transform 0.2s; }
.cta-btn:hover { background: var(--gold-pale); transform: translateY(-2px); }
.cta-btn:hover::after { transform: translateX(4px); }

.cta-small {
  display: block;
  font-size: 0.78rem;
  color: var(--fog);
  margin-top: 1.2rem;
  font-weight: 300;
}
.cta-small strong { color: var(--mist); font-weight: 400; }

.cta-dividers {
  display: flex;
  align-items: center;
  gap: 2rem;
  justify-content: center;
  margin-top: 3.5rem;
  flex-wrap: wrap;
}
.cta-divider-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.78rem;
  color: var(--fog);
  font-weight: 300;
}
.cta-divider-item::before {
  content: '';
  width: 4px; height: 4px;
  background: var(--gold-dim);
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Footer ──────────────────────────────────────────────────── */
footer {
  padding: 2.5rem var(--pad);
  border-top: 1px solid var(--line-dim);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}

.footer-logo {
  font-family: var(--serif);
  font-size: 1.1rem;
  color: var(--mist);
}
.footer-logo span { color: var(--gold); }
.footer-copy { font-size: 0.75rem; color: var(--fog); font-weight: 300; }
.footer-tagline {
  font-size: 0.72rem;
  color: var(--fog);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 300;
}

/* ── Animations ─────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ── Responsive ─────────────────────────────────────────────── */
@media (max-width: 900px) {
  .problem-layout { grid-template-columns: 1fr; gap: 3rem; }
  .model-steps { grid-template-columns: 1fr; gap: 2rem; }
  .model-steps::before { display: none; }
  .model-step::after { display: none; }
  .process-grid { grid-template-columns: 1fr 1fr; }
  .pricing-grid { grid-template-columns: 1fr; }
  .comparison-table { display: block; overflow-x: auto; }
  .faq-layout { grid-template-columns: 1fr; gap: 3rem; }
  .hero-stat-strip { gap: 2rem; }
  footer { flex-direction: column; text-align: center; }
}

@media (max-width: 600px) {
  .process-grid { grid-template-columns: 1fr; }
  nav { padding: 1rem var(--pad); }
  .nav-logo { font-size: 1.2rem; }
}

/* ── Scrollbar ───────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); }
</script>

</body>
</html>
