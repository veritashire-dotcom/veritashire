<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeritasHire — Hire-to-Own Offshore VA System</title>
<meta name="description" content="We place a vetted Indian VA with your business, run the first 90 days, then hand you a proven hire you own completely. No agency markup. Ever.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

<style>
/* ── Reset & Variables ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0D0F14;
  --ink-2:     #151820;
  --ink-3:     #1E222E;
  --gold:      #C9A96E;
  --gold-pale: #E8D5B0;
  --gold-dim:  #7A5F36;
  --fog:       #8A8FA0;
  --mist:      #B8BECA;
  --white:     #F4F1EC;
  --line:      rgba(201,169,110,0.15);
  --line-dim:  rgba(201,169,110,0.07);

  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans:  'DM Sans', system-ui, sans-serif;

  --max: 1160px;
  --pad: clamp(1.5rem, 5vw, 4rem);
}

html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--white);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
  cursor: default;
}

/* ── Grain overlay ───────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* ── Typography ─────────────────────────────────────────────── */
h1, h2, h3, h4 { font-family: var(--serif); font-weight: 400; line-height: 1.1; letter-spacing: -0.01em; }

.label {
  font-family: var(--sans);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ── Layout ─────────────────────────────────────────────────── */
.container { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }
section { position: relative; }

/* ── Nav ─────────────────────────────────────────────────────── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.4rem var(--pad);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(to bottom, rgba(13,15,20,0.95) 0%, transparent 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.nav-logo {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--white);
  letter-spacing: 0.02em;
  text-decoration: none;
}
.nav-logo span { color: var(--gold); }

.nav-cta {
  font-family: var(--sans);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--ink);
  background: var(--gold);
  padding: 0.6rem 1.4rem;
  text-decoration: none;
  transition: background 0.2s, transform 0.2s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
.nav-cta:hover { background: var(--gold-pale); transform: translateY(-1px); }

/* ── Hero ────────────────────────────────────────────────────── */
#hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 120px var(--pad) 80px;
  position: relative;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 50%, rgba(201,169,110,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(201,169,110,0.04) 0%, transparent 60%);
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,169,110,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,169,110,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}

.hero-inner {
  position: relative;
  max-width: var(--max);
  margin: 0 auto;
  width: 100%;
}

.hero-eyebrow {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.1s forwards;
}
.hero-eyebrow::before {
  content: '';
  width: 40px;
  height: 1px;
  background: var(--gold);
}

.hero-headline {
  font-size: clamp(3.2rem, 7vw, 6.5rem);
  font-weight: 300;
  line-height: 1.0;
  letter-spacing: -0.03em;
  max-width: 820px;
  margin-bottom: 1.8rem;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.2s forwards;
}
.hero-headline em {
  font-style: italic;
  color: var(--gold);
  font-weight: 300;
}

.hero-sub {
  font-size: clamp(1rem, 1.6vw, 1.15rem);
  color: var(--mist);
  max-width: 560px;
  line-height: 1.7;
  margin-bottom: 3rem;
  font-weight: 300;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.35s forwards;
}

.hero-actions {
  display: flex;
  align-items: center;
  gap: 2rem;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.5s forwards;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--ink);
  background: var(--gold);
  padding: 0.9rem 2rem;
  text-decoration: none;
  position: relative;
  transition: all 0.25s ease;
  clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
}
.btn-primary::after {
  content: '→';
  transition: transform 0.2s;
}
.btn-primary:hover { background: var(--gold-pale); transform: translateY(-2px); }
.btn-primary:hover::after { transform: translateX(4px); }

.hero-trust {
  font-size: 0.8rem;
  color: var(--fog);
  font-weight: 300;
  letter-spacing: 0.02em;
}
.hero-trust strong { color: var(--mist); font-weight: 400; }

.hero-stat-strip {
  display: flex;
  gap: 3rem;
  flex-wrap: wrap;
  margin-top: 5rem;
  padding-top: 2.5rem;
  border-top: 1px solid var(--line);
  opacity: 0;
  animation: fadeUp 0.9s ease 0.65s forwards;
}

.hero-stat { display: flex; flex-direction: column; gap: 0.3rem; }
.hero-stat-num {
  font-family: var(--serif);
  font-size: 2.4rem;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
}
.hero-stat-label { font-size: 0.75rem; color: var(--fog); letter-spacing: 0.08em; text-transform: uppercase; }

/* ── Problem ─────────────────────────────────────────────────── */
#problem {
  padding: 8rem var(--pad);
  background: var(--ink-2);
  border-top: 1px solid var(--line-dim);
}

.problem-layout {
  max-width: var(--max);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: start;
}

.problem-left {}
.problem-left .label { margin-bottom: 1.5rem; display: block; }
.problem-title {
  font-size: clamp(2.4rem, 4vw, 3.4rem);
  font-weight: 300;
  line-height: 1.1;
  margin-bottom: 1.5rem;
  color: var(--white);
}
.problem-title em { color: var(--gold); font-style: italic; }
.problem-body {
  color: var(--mist);
  font-size: 1rem;
  line-height: 1.75;
  font-weight: 300;
}

.problem-right { display: flex; flex-direction: column; gap: 0; }

.problem-item {
  padding: 1.6rem 0;
  border-bottom: 1px solid var(--line-dim);
  display: flex;
  gap: 1.2rem;
  align-items: flex-start;
}
.problem-item:first-child { border-top: 1px solid var(--line-dim); }

.problem-num {
  font-family: var(--serif);
  font-size: 1.8rem;
  color: var(--gold-dim);
  line-height: 1;
  flex-shrink: 0;
  width: 2.5rem;
  font-weight: 300;
}
.problem-text h4 {
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--white);
  margin-bottom: 0.3rem;
  letter-spacing: 0.02em;
}
.problem-text p { font-size: 0.88rem; color: var(--fog); line-height: 1.6; font-weight: 300; }

/* ── Model ───────────────────────────────────────────────────── */
#model {
  padding: 8rem var(--pad);
  background: var(--ink);
  overflow: hidden;
}

.model-inner { max-width: var(--max); margin: 0 auto; }
.model-header { text-align: center; margin-bottom: 5rem; }
.model-header .label { margin-bottom: 1.2rem; display: block; }
.model-title {
  font-size: clamp(2.4rem, 4vw, 3.6rem);
  font-weight: 300;
  line-height: 1.1;
}
.model-title em { color: var(--gold); font-style: italic; }
.model-subtitle { color: var(--mist); font-weight: 300; margin-top: 1rem; font-size: 1rem; }

.model-steps {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  position: relative;
}

.model-steps::before {
  content: '';
  position: absolute;
  top: 3.5rem;
  left: 16%;
  right: 16%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
  z-index: 0;
}

.model-step {
  padding: 0 2rem;
  position: relative;
  z-index: 1;
  text-align: center;
}
.model-step:not(:last-child)::after {
  content: '→';
  position: absolute;
  right: -0.5rem;
  top: 3rem;
  font-size: 1rem;
  color: var(--gold-dim);
  transform: translateY(-50%);
}

.step-icon {
  width: 7rem;
  height: 7rem;
  border: 1px solid var(--gold-dim);
  background: var(--ink-2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.8rem;
  position: relative;
  clip-path: polygon(15px 0%, 100% 0%, calc(100% - 15px) 100%, 0% 100%);
}

.step-icon svg { width: 28px; height: 28px; stroke: var(--gold); fill: none; stroke-width: 1.5; }

.step-num {
  font-family: var(--serif);
  font-size: 0.75rem;
  color: var(--gold-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.5rem;
}
.step-title {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--white);
  margin-bottom: 0.8rem;
}
.step-body { font-size: 0.875rem; color: var(--fog); line-height: 1.65; font-weight: 300; }

/* ── Process ─────────────────────────────────────────────────── */
#process {
  padding: 8rem var(--pad);
  background: var(--ink-2);
  border-top: 1px solid var(--line-dim);
}

.process-inner { max-width: var(--max); margin: 0 auto; }
.process-header { margin-bottom: 4rem; }
.process-header .label { display: block; margin-bottom: 1.2rem; }
.process-header h2 {
  font-size: clamp(2.2rem, 4vw, 3.2rem);
  font-weight: 300;
  max-width: 600px;
}
.process-header h2 em { color: var(--gold); font-style: italic; }

.process-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line-dim);
  border: 1px solid var(--line-dim);
}

.process-card {
  background: var(--ink);
  padding: 2.4rem 1.8rem;
  position: relative;
  overflow: hidden;
  transition: background 0.3s;
}
.process-card:hover { background: var
